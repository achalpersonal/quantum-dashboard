<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum QPU Status Dashboard</title>
    <style>
        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a1f2e;
            --bg-card: #242938;
            --text-primary: #ffffff;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --success: #3fb950;
            --warning: #d29922;
            --error: #f85149;
            --degraded: #db6d28;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #58a6ff, #a371f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .last-updated {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--bg-card);
        }

        .provider-section {
            margin-bottom: 3rem;
        }

        .qpu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .qpu-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .qpu-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .qpu-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .qpu-name {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .qpu-company {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-operational {
            background: rgba(63, 185, 80, 0.2);
            color: var(--success);
        }

        .status-degraded {
            background: rgba(219, 109, 40, 0.2);
            color: var(--degraded);
        }

        .status-outage, .status-major_outage {
            background: rgba(248, 81, 73, 0.2);
            color: var(--error);
        }

        .status-maintenance {
            background: rgba(210, 153, 34, 0.2);
            color: var(--warning);
        }

        .status-unknown {
            background: rgba(139, 148, 158, 0.2);
            color: var(--text-secondary);
        }

        .qpu-specs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .spec-item {
            display: flex;
            flex-direction: column;
        }

        .spec-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .spec-value {
            font-size: 1rem;
            font-weight: 500;
        }

        .uptime-bar {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .uptime-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        .uptime-track {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .uptime-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .uptime-high { background: var(--success); }
        .uptime-medium { background: var(--warning); }
        .uptime-low { background: var(--error); }

        .cloud-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .cloud-badge {
            padding: 0.2rem 0.5rem;
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--accent);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .status-link {
            display: inline-block;
            margin-top: 0.5rem;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .status-link:hover {
            text-decoration: underline;
        }

        .incident-banner {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid var(--error);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 2rem;
        }

        .incident-title {
            color: var(--error);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .incident-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 3rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            h1 {
                font-size: 1.75rem;
            }

            .qpu-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Quantum QPU Status Dashboard</h1>
            <p class="subtitle">Real-time availability of cloud-accessible quantum computers</p>
            <p class="last-updated" id="lastUpdated">Loading...</p>
        </header>

        <div id="incidents"></div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="totalQpus">-</div>
                <div class="stat-label">QPUs Tracked</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="operationalQpus">-</div>
                <div class="stat-label">Operational</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="degradedQpus">-</div>
                <div class="stat-label">Degraded/Outage</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="companiesCount">-</div>
                <div class="stat-label">Providers</div>
            </div>
        </div>

        <div id="qpuContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p style="margin-top: 1rem;">Fetching live QPU status...</p>
            </div>
        </div>

        <footer>
            <p>Data sources: <a href="https://status.ionq.co" target="_blank">IonQ Status</a> |
            <a href="https://quantum.ibm.com" target="_blank">IBM Quantum</a> |
            <a href="https://aws.amazon.com/braket/" target="_blank">AWS Braket</a> |
            <a href="https://nexus.quantinuum.com" target="_blank">Quantinuum Nexus</a></p>
            <p style="margin-top: 0.5rem;">Auto-refreshes every 60 seconds</p>
        </footer>
    </div>

    <script>
        // QPU Data with static specs + live status where available
        const qpuData = [
            // IonQ - Live status from API
            {
                company: "IonQ",
                name: "Forte",
                technology: "Trapped Ion",
                qubits: 36,
                q1_fidelity: "99.98%",
                q2_fidelity: "99.6%",
                cloud: ["AWS Braket", "Azure Quantum", "Google Cloud"],
                statusSource: "ionq",
                statusKey: "IonQ Forte",
                statusPage: "https://status.ionq.co"
            },
            {
                company: "IonQ",
                name: "Forte Enterprise 1",
                technology: "Trapped Ion",
                qubits: 36,
                q1_fidelity: "99.98%",
                q2_fidelity: "99.6%",
                cloud: ["AWS Braket", "Azure Quantum"],
                statusSource: "ionq",
                statusKey: "IonQ Forte Enterprise 1",
                statusPage: "https://status.ionq.co"
            },
            {
                company: "IonQ",
                name: "Aria-1",
                technology: "Trapped Ion",
                qubits: 25,
                q1_fidelity: "99.95%",
                q2_fidelity: "99.6%",
                cloud: ["AWS Braket", "Azure Quantum"],
                statusSource: "ionq",
                statusKey: "ionq-aria",
                statusPage: "https://status.ionq.co"
            },
            // Quantinuum
            {
                company: "Quantinuum",
                name: "H2-1",
                technology: "Trapped Ion",
                qubits: 56,
                q1_fidelity: "99.99%",
                q2_fidelity: "99.8%",
                cloud: ["Azure Quantum", "Quantinuum Cloud"],
                statusSource: "static",
                status: "check_provider",
                statusPage: "https://nexus.quantinuum.com/backends/Quantinuum/H2-1"
            },
            {
                company: "Quantinuum",
                name: "H2-2",
                technology: "Trapped Ion",
                qubits: 56,
                q1_fidelity: "99.99%",
                q2_fidelity: "99.8%",
                cloud: ["Azure Quantum", "Quantinuum Cloud"],
                statusSource: "static",
                status: "check_provider",
                statusPage: "https://nexus.quantinuum.com/backends/Quantinuum/H2-2"
            },
            {
                company: "Quantinuum",
                name: "Helios",
                technology: "Trapped Ion",
                qubits: 98,
                q1_fidelity: "99.9975%",
                q2_fidelity: "99.921%",
                cloud: ["Quantinuum Cloud"],
                statusSource: "static",
                status: "check_provider",
                statusPage: "https://www.quantinuum.com/products-solutions/quantinuum-systems/helios"
            },
            // IBM Quantum
            {
                company: "IBM",
                name: "Heron r3",
                technology: "Superconducting",
                qubits: 156,
                q1_fidelity: "99.97%",
                q2_fidelity: "99.56%",
                cloud: ["IBM Quantum"],
                statusSource: "static",
                status: "check_provider",
                statusPage: "https://quantum.ibm.com"
            },
            {
                company: "IBM",
                name: "Eagle r3 (Brisbane)",
                technology: "Superconducting",
                qubits: 127,
                q1_fidelity: "99.98%",
                q2_fidelity: "98.35%",
                cloud: ["IBM Quantum"],
                statusSource: "static",
                status: "check_provider",
                statusPage: "https://quantum.ibm.com"
            },
            // Rigetti
            {
                company: "Rigetti",
                name: "Ankaa-3",
                technology: "Superconducting",
                qubits: 84,
                q1_fidelity: "99.9%",
                q2_fidelity: "99.0%",
                cloud: ["AWS Braket", "Azure Quantum"],
                statusSource: "static",
                status: "available_24_7",
                uptime: 99.9,
                statusPage: "https://qcs.rigetti.com/qpus"
            },
            {
                company: "Rigetti",
                name: "Cepheus-1-36Q",
                technology: "Superconducting",
                qubits: 36,
                q1_fidelity: "99.9%",
                q2_fidelity: "99.5%",
                cloud: ["Rigetti QCS"],
                statusSource: "static",
                status: "available_24_7",
                uptime: 99.9,
                statusPage: "https://qcs.rigetti.com/qpus"
            },
            // QuEra
            {
                company: "QuEra",
                name: "Aquila",
                technology: "Neutral Atom",
                qubits: 256,
                q1_fidelity: "N/A",
                q2_fidelity: "N/A (Analog)",
                cloud: ["AWS Braket"],
                statusSource: "static",
                status: "check_provider",
                statusPage: "https://aws.amazon.com/braket/quantum-computers/quera/"
            },
            // IQM
            {
                company: "IQM",
                name: "Garnet",
                technology: "Superconducting",
                qubits: 20,
                q1_fidelity: "99.9%",
                q2_fidelity: "97.0%",
                cloud: ["AWS Braket"],
                statusSource: "static",
                status: "check_provider",
                statusPage: "https://aws.amazon.com/braket/quantum-computers/iqm/"
            },
            // AQT
            {
                company: "AQT",
                name: "IBEX-Q1",
                technology: "Trapped Ion",
                qubits: 24,
                q1_fidelity: "99.96%",
                q2_fidelity: "98.5%",
                cloud: ["AWS Braket"],
                statusSource: "static",
                status: "scheduled_windows",
                uptime: null,
                statusPage: "https://aws.amazon.com/braket/quantum-computers/aqt/"
            },
            // Google
            {
                company: "Google",
                name: "Willow",
                technology: "Superconducting",
                qubits: 105,
                q1_fidelity: "99.97%",
                q2_fidelity: "99.64%",
                cloud: ["Limited Access"],
                statusSource: "static",
                status: "research_only",
                statusPage: "https://quantumai.google/"
            }
        ];

        let ionqStatus = {};
        let ionqUptime = {};
        let incidents = [];

        async function fetchIonQStatus() {
            try {
                const response = await fetch('https://status.ionq.co/api/v2/summary.json');
                const data = await response.json();

                // Map component statuses
                data.components.forEach(comp => {
                    ionqStatus[comp.name] = comp.status;
                });

                // Get incidents
                incidents = data.incidents || [];

                return true;
            } catch (error) {
                console.error('Failed to fetch IonQ status:', error);
                return false;
            }
        }

        async function fetchIonQUptime() {
            try {
                // Statuspage.io provides uptime data at this endpoint
                const response = await fetch('https://status.ionq.co/api/v2/components.json');
                const data = await response.json();

                // Note: Uptime percentages are not always in the API, may need to calculate from incidents
                data.components.forEach(comp => {
                    ionqUptime[comp.name] = {
                        status: comp.status,
                        updatedAt: comp.updated_at
                    };
                });

                return true;
            } catch (error) {
                console.error('Failed to fetch IonQ uptime:', error);
                return false;
            }
        }

        function getStatusDisplay(qpu) {
            if (qpu.statusSource === 'ionq') {
                const status = ionqStatus[qpu.statusKey];
                if (status) {
                    return {
                        status: status,
                        label: status.replace('_', ' ').toUpperCase()
                    };
                }
            }

            // Static status mappings
            const staticLabels = {
                'check_provider': { status: 'unknown', label: 'CHECK PROVIDER' },
                'available_24_7': { status: 'operational', label: 'AVAILABLE 24/7' },
                'scheduled_windows': { status: 'degraded', label: 'SCHEDULED WINDOWS' },
                'research_only': { status: 'maintenance', label: 'RESEARCH ONLY' }
            };

            return staticLabels[qpu.status] || { status: 'unknown', label: 'UNKNOWN' };
        }

        function renderIncidents() {
            const container = document.getElementById('incidents');
            if (incidents.length === 0) {
                container.innerHTML = '';
                return;
            }

            const activeIncidents = incidents.filter(i => i.status !== 'resolved');
            if (activeIncidents.length === 0) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = activeIncidents.map(incident => `
                <div class="incident-banner">
                    <div class="incident-title">Active Incident: ${incident.name}</div>
                    <div class="incident-description">
                        ${incident.incident_updates?.[0]?.body || 'Investigation in progress'}
                    </div>
                </div>
            `).join('');
        }

        function renderQPUs() {
            const container = document.getElementById('qpuContainer');

            // Group by company
            const grouped = {};
            qpuData.forEach(qpu => {
                if (!grouped[qpu.company]) grouped[qpu.company] = [];
                grouped[qpu.company].push(qpu);
            });

            // Calculate stats
            let totalOperational = 0;
            let totalDegraded = 0;

            qpuData.forEach(qpu => {
                const statusInfo = getStatusDisplay(qpu);
                if (statusInfo.status === 'operational') totalOperational++;
                else if (['degraded', 'major_outage', 'outage'].includes(statusInfo.status)) totalDegraded++;
            });

            document.getElementById('totalQpus').textContent = qpuData.length;
            document.getElementById('operationalQpus').textContent = totalOperational;
            document.getElementById('degradedQpus').textContent = totalDegraded;
            document.getElementById('companiesCount').textContent = Object.keys(grouped).length;

            // Render sections
            let html = '';

            Object.entries(grouped).forEach(([company, qpus]) => {
                html += `
                    <section class="provider-section">
                        <h2 class="section-title">${company}</h2>
                        <div class="qpu-grid">
                            ${qpus.map(qpu => renderQPUCard(qpu)).join('')}
                        </div>
                    </section>
                `;
            });

            container.innerHTML = html;
        }

        function renderQPUCard(qpu) {
            const statusInfo = getStatusDisplay(qpu);
            const uptimeValue = qpu.uptime || (statusInfo.status === 'operational' ? 99 : null);

            let uptimeClass = 'uptime-high';
            if (uptimeValue !== null) {
                if (uptimeValue < 80) uptimeClass = 'uptime-low';
                else if (uptimeValue < 95) uptimeClass = 'uptime-medium';
            }

            return `
                <div class="qpu-card">
                    <div class="qpu-header">
                        <div>
                            <div class="qpu-name">${qpu.name}</div>
                            <div class="qpu-company">${qpu.technology}</div>
                        </div>
                        <span class="status-badge status-${statusInfo.status}">${statusInfo.label}</span>
                    </div>

                    <div class="qpu-specs">
                        <div class="spec-item">
                            <span class="spec-label">Qubits</span>
                            <span class="spec-value">${qpu.qubits}</span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">1Q Fidelity</span>
                            <span class="spec-value">${qpu.q1_fidelity}</span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">2Q Fidelity</span>
                            <span class="spec-value">${qpu.q2_fidelity}</span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">Technology</span>
                            <span class="spec-value">${qpu.technology.split(' ')[0]}</span>
                        </div>
                    </div>

                    ${uptimeValue !== null ? `
                    <div class="uptime-bar">
                        <div class="uptime-label">
                            <span>90-Day Uptime</span>
                            <span>${uptimeValue.toFixed(1)}%</span>
                        </div>
                        <div class="uptime-track">
                            <div class="uptime-fill ${uptimeClass}" style="width: ${uptimeValue}%"></div>
                        </div>
                    </div>
                    ` : ''}

                    <div class="cloud-badges">
                        ${qpu.cloud.map(c => `<span class="cloud-badge">${c}</span>`).join('')}
                    </div>

                    <a href="${qpu.statusPage}" target="_blank" class="status-link">View provider status →</a>
                </div>
            `;
        }

        async function init() {
            await Promise.all([
                fetchIonQStatus(),
                fetchIonQUptime()
            ]);

            renderIncidents();
            renderQPUs();

            document.getElementById('lastUpdated').textContent =
                `Last updated: ${new Date().toLocaleString()}`;
        }

        // Initial load
        init();

        // Auto-refresh every 60 seconds
        setInterval(init, 60000);
    </script>
</body>
</html>
